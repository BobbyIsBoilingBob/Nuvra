<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0e1a" />
  <title>Zeviqo — Walking Adventures</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    #boot { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #0a0e1a; z-index: 9999; }
    #boot .logo { font-family: 'Space Grotesk', sans-serif; font-size: 2rem; font-weight: 700; color: #00c4ff; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
</head>
<body>
  <div id="boot"><div class="logo">Zeviqo</div></div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
